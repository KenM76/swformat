name: CI

# Pure-Python CI: the library runs with no SOLIDWORKS, no license, and on any
# OS — so CI runs on Linux to prove it. Layer-3 tests (live-SOLIDWORKS reopen
# via combridge) require Windows + SOLIDWORKS and are skipped here; the
# real-fixture Layer-2 tests skip when no local corpus file is present. The
# synthetic Layer-1/2 suite is the portable gate.

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    name: tests (pure-Python, no SOLIDWORKS) — py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Corpus-IP guard (no real CAD files may be committed)
        run: |
          if git ls-files | grep -iE '\.sld(prt|asm|drw|lfp|dot)$'; then
            echo "ERROR: tracked SOLIDWORKS file(s) found — none may be committed (see docs/LEGAL.md)."
            exit 1
          fi
          echo "OK: no tracked .sld* files."

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — advisory
        run: ruff check src/ test/
        continue-on-error: true

      - name: Type-check (mypy, strict) on the core (types + Layer 1 + io)
        # The core is kept mypy --strict clean. The higher M2+/M5+ layers
        # (api/, carchive/, sketches/, tools/) are intentionally permissive
        # while they stabilise, so they are not strict-checked here.
        run: mypy src/swformat/types.py src/swformat/chunks src/swformat/io

      - name: Tests (Layers 1+2; Layer 3 requires SOLIDWORKS and is skipped)
        run: pytest test/harness -q
